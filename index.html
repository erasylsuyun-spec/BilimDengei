<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO-HARD 100 🔥</title>
    <style>
        :root { --main: #27ae60; --dark: #1b262c; --light: #f8fbf8; --red: #c0392b; --accent: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; color: #2c3e50; margin: 0; padding: 20px; }
        .container { max-width: 750px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-top: 12px solid var(--main); }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--main); font-size: 35px; text-transform: uppercase; margin: 0; }
        .question-card { background: #fff; border: 2px solid #f0f0f0; padding: 25px; border-radius: 20px; margin-bottom: 25px; }
        .options label { display: flex; align-items: center; background: #f9f9f9; padding: 15px; margin: 12px 0; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .options label:hover { background: #eafaf1; border-color: var(--main); }
        input[type="radio"] { accent-color: var(--main); margin-right: 15px; transform: scale(1.3); }
        button { width: 100%; padding: 20px; background: var(--main); color: white; border: none; border-radius: 15px; font-size: 22px; cursor: pointer; font-weight: bold; }
        button:hover { background: var(--dark); transform: translateY(-3px); }
        #result-screen { display: none; text-align: center; }
        .error-log { text-align: left; background: #fff5f5; padding: 20px; border-radius: 15px; margin-top: 15px; border-left: 6px solid var(--red); }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="header">
        <h1>🧬 BIO-HARD 100</h1>
        <p style="font-size: 18px; margin: 20px 0;">Базада 100 қиын сұрақ. Саған кездейсоқ <b>10 сұрақ</b> беріледі.</p>
        <p style="color:var(--accent); font-weight:bold; font-size: 20px;">УВЕРЕНСЫҢ БА 30/30-ҒА, БАУЫРЫМ? 🔥</p>
        <!-- МЫНАУ 29-ЖОЛ, ЕНДІ ҚАТЕСІЗ: -->
        <button type="button" onclick="generateTest()">ТЕСТТІ БАСТАУ 🔥</button>
    </div>

    <div id="quiz-area" style="display:none;">
        <div id="questions-container"></div>
        <button type="button" onclick="finishTest()">НӘТИЖЕНІ КӨРУ ✅</button>
    </div>

    <div id="result-screen">
        <div id="score-display" style="font-size: 60px; font-weight: bold; color: var(--main);"></div>
        <div id="status-msg"></div>
        <button type="button" onclick="showErrors()" style="background:#555; margin-bottom:15px; font-size: 16px;">ҚАТЕМЕН ЖҰМЫС</button>
        <button type="button" onclick="location.reload()">ЖАҢА НҰСҚА ТАПСЫРУ 🔄</button>
        <div id="error-list"></div>
    </div>
</div>

<script>
    const database = [
        {q: "Нәруыздың бірінші реттік құрылымындағы байланыс?", a: ["Сутектік", "Пептидтік", "Дисульфидтік", "Иондық"], r: 1, n: "Аминқышқылдары пептидтік байланыспен жалғасады."},
        {q: "Гликолиздің оттегісіз кезеңінде неше АТФ түзіледі?", a: ["2 АТФ", "36 АТФ", "38 АТФ", "0 АТФ"], r: 0, n: "Дайындықсыз кезеңде тек 2 моль АТФ бөлінеді."},
        {q: "Дигибридті будандастырудың фенотипі (Мендель)?", a: ["3:1", "1:2:1", "9:3:3:1", "1:1:1:1"], r: 2, n: "Екі белгі бойынша ажырау 9:3:3:1 болады."},
        {q: "Адамдағы Х-хромосомасымен тіркесіп берілетін ауру?", a: ["Даун", "Дальтонизм", "Тұмау", "Альбинизм"], r: 1, n: "Дальтонизм мен Гемофилия Х-пен тіркеседі."},
        {q: "ДНҚ-да аденинге комплементарлы нуклеотид?", a: ["Гуанин", "Цитозин", "Тимин", "Урацил"], r: 2, n: "ДНҚ-да А=Т жұбы түзіледі."},
        {q: "Фотосинтездің жарық фазасы қайда өтеді?", a: ["Строма", "Тилакоид", "Матрикс", "Криста"], r: 1, n: "Жарық фазасы тилакоид мембранасында өтеді."},
        {q: "Жасушаның бөлінуін қамтамасыз ететін органоид?", a: ["Центриоль", "Лизосома", "Рибосома", "Вакуоль"], r: 0, n: "Жасуша орталығы (центриоль) бөлінуге қатысады."},
        {q: "АТФ синтезі жүретін жасушалық органоид?", a: ["Ядро", "Митохондрия", "Гольджи жиынтығы", "ЭПТ"], r: 1, n: "Митохондрия — жасушаның қуат станциясы."},
        {q: "ДНҚ-дан ақпараттың РНҚ-ға көшірілуі қалай аталады?", a: ["Трансляция", "Транскрипция", "Репликация", "Мутация"], r: 1, n: "Транскрипция — ақпаратты ДНҚ-дан иРНҚ-ға көшіру."},
        {q: "Адамдағы соматикалық жасушадағы хромосома саны?", a: ["23", "46", "48", "92"], r: 1, n: "Дене жасушаларында диплоидты (46) хромосома жиынтығы болады."}
        // ... Базаны осылай жалғастыра беруге болады
    ];

    let currentTest = [];
    let userAnswers = [];

    function generateTest() {
        console.log("Тест басталды..."); // Тексеру үшін
        if(database.length === 0) return alert("База бос!");
        
        currentTest = [...database].sort(() => 0.5 - Math.random()).slice(0, 20);
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        
        const container = document.getElementById('questions-container');
        container.innerHTML = currentTest.map((item, i) => `
            <div class="question-card">
                <p><strong>${i+1}. ${item.q}</strong></p>
                <div class="options">
                    ${item.a.map((opt, idx) => `<label><input type="radio" name="q${i}" value="${idx}"> <span>${['А','Б','С','Д'][idx]}) ${opt}</span></label>`).join('')}
                </div>
            </div>
        `).join('');
        window.scrollTo(0, 0);
    }

    function finishTest() {
        let score = 0;
        userAnswers = [];
        currentTest.forEach((item, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const val = sel ? parseInt(sel.value) : null;
            userAnswers.push(val);
            if(val === item.r) score++;
        });

        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-display').innerText = `${score} / 20`;
        
        const msg = document.getElementById('status-msg');
        msg.innerHTML = score < 10 ? '<h2 style="color:red">СЕН ТУПОЙЙЙЙЙ! 💀</h2>' : '<h2 style="color:green">ЖАРАЙСЫҢ, БАУЫРЫМ! 🔥🦍</h2>';
        window.scrollTo(0, 0);
    }

    function showErrors() {
        const list = document.getElementById('error-list');
        list.innerHTML = currentTest.map((item, i) => userAnswers[i] !== item.r ? `
            <div class="error-log">
                <strong>${i+1}. ${item.q}</strong><br>
                <span style="color:green">Дұрыс жауап: ${['А','Б','С','Д'][item.r]}) ${item.a[item.r]}</span><br>
                <small>💡 ${item.n}</small>
            </div>
        ` : "").join("");
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
