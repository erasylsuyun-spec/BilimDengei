<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOLOGY HARD-100 🔥</title>
    <style>
        :root { --main: #27ae60; --dark: #1b262c; --light: #f8fbf8; --red: #c0392b; --accent: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; color: #2c3e50; margin: 0; padding: 20px; }
        .container { max-width: 750px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-top: 12px solid var(--main); }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--main); font-size: 35px; text-transform: uppercase; margin: 0; }
        .question-card { background: #fff; border: 2px solid #f0f0f0; padding: 25px; border-radius: 20px; margin-bottom: 25px; transition: 0.3s; }
        .question-card:hover { border-color: var(--main); }
        .options label { display: flex; align-items: center; background: #f9f9f9; padding: 15px; margin: 12px 0; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .options label:hover { background: #eafaf1; }
        input[type="radio"] { accent-color: var(--main); margin-right: 15px; transform: scale(1.3); }
        button { width: 100%; padding: 20px; background: var(--main); color: white; border: none; border-radius: 15px; font-size: 22px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(39,174,96,0.3); }
        button:hover { background: var(--dark); transform: translateY(-3px); }
        #result-screen { display: none; text-align: center; }
        .error-log { text-align: left; background: #fff5f5; padding: 20px; border-radius: 15px; margin-top: 15px; border-left: 6px solid var(--red); }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="header">
        <h1>🧬 BIO-HARD 100</h1>
        <p style="font-size: 18px; margin: 20px 0;">Базада 100 қиын сұрақ. Саған кездейсоқ <b>20 сұрақ</b> беріледі.</p>
        <p style="color:var(--accent); font-weight:bold; font-size: 20px;">ДАЙЫНСЫҢ БА, БАУЫРЫМ? 🦍</p>
        <button onclick="generateTest()">ТЕСТТІ БАСТАУ 🔥</button>
    </div>

    <div id="quiz-area" style="display:none;">
        <div id="questions-container"></div>
        <button onclick="finishTest()">НӘТИЖЕНІ КӨРУ ✅</button>
    </div>

    <div id="result-screen">
        <div id="score-display" style="font-size: 60px; font-weight: bold; color: var(--main);"></div>
        <div id="status-msg"></div>
        <button onclick="showErrors()" style="background:#555; margin-bottom:15px; font-size: 16px;">ҚАТЕМЕН ЖҰМЫС</button>
        <button onclick="location.reload()">ЖАҢА НҰСҚА ТАПСЫРУ 🔄</button>
        <div id="error-list"></div>
    </div>
</div>

<script>
    const database = [
        {q: "Нәруыздың бірінші реттік құрылымындағы байланыс?", a: ["Сутектік", "Пептидтік", "Дисульфидтік", "Иондық"], r: 1, n: "Аминқышқылдары пептидтік байланыспен жалғасады."},
        {q: "Гликолиздің оттегісіз кезеңінде 1 моль глюкозадан неше АТФ түзіледі?", a: ["2 АТФ", "36 АТФ", "38 АТФ", "4 АТФ"], r: 0, n: "Дайындықсыз кезеңде энергия шығымы тек 2 моль АТФ."},
        {q: "Дигибридті будандастыруда фенотиптік ажырау қалай жүреді?", a: ["3:1", "1:2:1", "9:3:3:1", "1:1:1:1"], r: 2, n: "Екі белгі бойынша ажырау 9:3:3:1 қатынасында болады."},
        {q: "Адамда Х-хромосомасымен тіркесіп берілетін рецессивті ауру?", a: ["Даун синдромы", "Дальтонизм", "Полидактилия", "Альбинизм"], r: 1, n: "Дальтонизм Х-хромосомасына тіркесіп тұқым қуалайды."},
        {q: "ДНҚ молекуласындағы аденинге (А) комплементарлы нуклеотид?", a: ["Гуанин", "Цитозин", "Тимин", "Урацил"], r: 2, n: "ДНҚ-да А=Т (Тимин) жұбы болады."},
        {q: "Фотосинтездің жарық фазасы хлоропласттың қай жерінде жүреді?", a: ["Стромада", "Тилакоидта", "Матриксте", "Кристада"], r: 1, n: "Жарық фазасы тилакоид мембранасында өтеді."},
        {q: "Жасушаның бөліну шүйкесін түзетін органоид?", a: ["Центриоль", "Лизосома", "Рибосома", "Вакуоль"], r: 0, n: "Жасуша орталығы бөліну жіпшелерін түзеді."},
        {q: "АТФ синтезі жүретін жасушалық органоид?", a: ["Ядро", "Митохондрия", "Гольджи жиынтығы", "ЭПТ"], r: 1, n: "Митохондрия — жасушаның қуат станциясы."},
        {q: "ДНҚ-дан ақпараттың РНҚ-ға көшірілуі қалай аталады?", a: ["Трансляция", "Транскрипция", "Репликация", "Мутация"], r: 1, n: "Транскрипция — ақпаратты ДНҚ-дан иРНҚ-ға көшіру."},
        {q: "Адамдағы соматикалық жасушадағы хромосома саны?", a: ["23", "46", "48", "92"], r: 1, n: "Дене жасушаларында диплоидты (46) жиынтық болады."},
        {q: "А дәрумені жетіспегенде пайда болатын ауру?", a: ["Бери-бери", "Рахит", "Ақшам соқыр", "Цинга"], r: 2, n: "А дәрумені көру пигментіне жауапты."},
        {q: "Өсімдіктегі судың жоғары қозғалысын қамтамасыз ететін тін?", a: ["Флоэма", "Ксилема", "Камбий", "Паренхима"], r: 1, n: "Ксилема арқылы су мен минералдар көтеріледі."},
        {q: "Мейоздың бірінші профазасындағы хромосомалардың жұптасуы?", a: ["Конъюгация", "Кроссинговер", "Инверсия", "Транслокация"], r: 0, n: "Конъюгация — гомологты хромосомалардың жақындасуы."},
        {q: "Орталық жүйке жүйесіне не жатады?", a: ["Жүйкелер", "Ми мен жұлын", "Түйіндер", "Рецепторлар"], r: 1, n: "ОЖЖ — ми мен жұлыннан тұрады."},
        {q: "Инсулин гормонын бөлетін без?", a: ["Бауыр", "Ұйқы безі", "Бүйрек үсті безі", "Гипофиз"], r: 1, n: "Ұйқы безі инсулин бөліп, қантты реттейді."},
        {q: "Бактерия жасушасына тән емес құрылым?", a: ["ДНҚ", "Рибосома", "Ядро", "Мембрана"], r: 2, n: "Бактериялар прокариот болғандықтан, оларда ядро жоқ."},
        {q: "Қалқанша безінің қызметіне қажетті элемент?", a: ["Темір", "Йод", "Кальций", "Магний"], r: 1, n: "Тироксин түзілуіне йод қажет."},
        {q: "Партеногенез дегеніміз не?", a: ["Жыныссыз көбею", "Ұрықтанбаған жұмыртқадан даму", "Бүршіктену", "Бөліну"], r: 1, n: "Партеногенез — ұрықтанбай даму."},
        {q: "Нейронның қысқа өсіндісі қалай аталады?", a: ["Аксон", "Дендрит", "Синапс", "Миелин"], r: 1, n: "Дендрит импульсті қабылдайды."},
        {q: "Вирустардың нәруызды қабығы?", a: ["Мембрана", "Капсид", "Қабырға", "Нуклеоид"], r: 1, n: "Капсид — вирустың қорғаныш қабығы."},
        {q: "Нәруыз молекуласындағы аминқышқылдарының ретін не анықтайды?", a: ["иРНҚ", "тРНҚ", "ДНҚ", "рРНҚ"], r: 2, n: "Генетикалық ақпарат ДНҚ-да сақталады."},
        {q: "Митоздың қай кезеңінде ядро қабықшасы жойылады?", a: ["Профаза", "Метафаза", "Анафаза", "Телофаза"], r: 0, n: "Профазада ядро бұзылып, хромосомалар шығады."},
        {q: "Жасуша мембранасының негізін не құрайды?", a: ["Нәруыздар", "Липидтер", "Көмірсулар", "Нуклеотидтер"], r: 1, n: "Мембрана фосфолипидтердің биқабатынан тұрады."},
        {q: "Фотосинтездің қараңғы фазасы қайда өтеді?", a: ["Тилакоидта", "Стромада", "Гранада", "Матриксте"], r: 1, n: "Стромада Кальвин циклі жүреді."},
        {q: "Гемофилия ауруы қандай мутацияға жатады?", a: ["Гендік", "Хромосомалық", "Геномдық", "Цитоплазмалық"], r: 0, n: "Гендік мутация — жеке геннің өзгеруі."},
        {q: "Ересек адамның қаңқасында шамамен неше сүйек бар?", a: ["150", "206", "300", "100"], r: 1, n: "Ересек адамда 206-208 сүйек болады."},
        {q: "Тірі ағзалардың ішкі ортасының тұрақтылығы?", a: ["Метаболизм", "Гомеостаз", "Анаболизм", "Катаболизм"], r: 1, n: "Гомеостаз — ішкі тұрақтылық."},
        {q: "Жүйке жасушасының ұзын өсіндісі?", a: ["Дендрит", "Аксон", "Синапс", "Глия"], r: 1, n: "Аксон импульсті нейроннан алып кетеді."},
        {q: "D дәрумені жетіспегенде болатын ауру?", a: ["А", "В", "С", "Рахит"], r: 3, n: "D дәрумені сүйек қатаюына қажет."},
        {q: "Митохондрияның ішкі мембрана иірімдері?", a: ["Грана", "Криста", "Строма", "Матрикс"], r: 1, n: "Кристалар АТФ синтезін арттырады."},
        {q: "Жануарларда қорға жиналатын көмірсу?", a: ["Крахмал", "Гликоген", "Целлюлоза", "Хитин"], r: 1, n: "Гликоген бауыр мен бұлшықетте сақталады."},
        {q: "ДНҚ репликациясы қай кезеңде жүреді?", a: ["Интерфаза", "Профаза", "Метафаза", "Телофаза"], r: 0, n: "Интерфазаның S кезеңінде ДНҚ еселенеді."},
        {q: "Иммунитет орталығы болып саналатын без?", a: ["Бүйрек", "Айырша без", "Өкпе", "Асқазан"], r: 1, n: "Тимус (айырша без) Т-лимфоциттерді оқытады."},
        {q: "Өсімдік жасушасының қабырғасы неден тұрады?", a: ["Хитин", "Муреин", "Целлюлоза", "Гликоген"], r: 2, n: "Целлюлоза беріктік береді."},
        {q: "Трансляция қайда жүреді?", a: ["Ядрода", "Рибосомада", "Лизосомада", "Митохондрияда"], r: 1, n: "Рибосомада нәруыз құрастырылады."},
        {q: "Аппендикс қандай мүшеге жатады?", a: ["Атавизм", "Рудимент", "Аналог", "Гомолог"], r: 1, n: "Рудимент — қалдық мүше."},
        {q: "Көру зонасы мидың қай бөлігінде?", a: ["Маңдай", "Төбе", "Шүйде", "Самай"], r: 2, n: "Шүйде көру ақпаратын өңдейді."},
        {q: "Бактериофаг деген не?", a: ["Бактерия", "Вирус", "Саңырауқұлақ", "Балдыр"], r: 1, n: "Бактериофаг — бактерияны зақымдайтын вирус."},
        {q: "АТФ-та неше макроэргиялық байланыс бар?", a: ["1", "2", "3", "4"], r: 1, n: "2 макроэргиялық байланыс энергия сақтайды."},
        {q: "Қанның сұйық бөлігі қалай аталады?", a: ["Лимфа", "Плазма", "Сарысу", "Фибрин"], r: 1, n: "Плазма — қанның негізгі сұйықтығы."},
        {q: "Гаметалардың бөлінуі қалай аталады?", a: ["Митоз", "Мейоз", "Амитоз", "Шизогония"], r: 1, n: "Мейоз жыныс жасушаларын түзеді."},
        {q: "ДНҚ-дағы АТГ-ЦЦГ тізбегіне комплементарлы тізбек?", a: ["ТАЦ-ГГЦ", "УАЦ-ГГЦ", "ГЦТ-ААГ", "ЦГТ-ТТА"], r: 0, n: "А-Т, Г-Ц заңы бойынша."},
        {q: "Қандағы қантты азайтатын гормон?", a: ["Адреналин", "Тироксин", "Инсулин", "Глюкагон"], r: 2, n: "Инсулин глюкозаны төмендетеді."},
        {q: "Эритроциттердің негізгі қызметі?", a: ["Қорғаныш", "Газ тасымалдау", "Ұю", "Қозғалу"], r: 1, n: "Оттегі мен көмірқышқыл газын тасиды."},
        {q: "Тыныс алу орталығы қайда орналасқан?", a: ["Ортаңғы ми", "Сопақша ми", "Мишық", "Аралық ми"], r: 1, n: "Сопақша ми тыныс алуды басқарады."},
        {q: "Жасушадағы ас қорыту мүшесі?", a: ["Рибосома", "Лизосома", "ЭПТ", "Вакуоль"], r: 1, n: "Лизосома заттарды ыдыратады."},
        {q: "Қос тынысты ағзаны тап?", a: ["Бақа", "Кит", "Құс", "Акула"], r: 2, n: "Құстарда ауа қапшықтары бар."},
        {q: "Генетикалық кодтың бір триплети неше нуклеотид?", a: ["1", "2", "3", "4"], r: 2, n: "3 нуклеотид = 1 аминқышқылы."},
        {q: "Саңырауқұлақ қабырғасы неден тұрады?", a: ["Целлюлоза", "Хитин", "Гликоген", "Муреин"], r: 1, n: "Саңырауқұлақта хитин болады."},
        {q: "Есту рецепторлары қайда орналасқан?", a: ["Дабыл жарғағында", "Ұлуда", "Балғашада", "Үзеңгіде"], r: 1, n: "Ішкі құлақтағы ұлуда рецепторлар бар."},
        {q: "Органикалық затты ыдырататын ағзалар?", a: ["Продуцент", "Консумент", "Редуцент", "Паразит"], r: 2, n: "Редуценттер бейорганикалыққа айналдырады."},
        {q: "Гендік инженерия нысаны?", a: ["Плазмида", "Вирус", "Ядро", "Тін"], r: 0, n: "Плазмида арқылы ген тасымалданады."},
        {q: "Биогенетикалық заңды кімдер ашты?", a: ["Шлейден", "Мюллер мен Геккель", "Уотсон", "Дарвин"], r: 1, n: "Мюллер мен Геккель заңы."},
        {q: "Әмбебап донор қай қан тобы?", a: ["I", "II", "III", "IV"], r: 0, n: "I топты барлығына құюға болады."},
        {q: "Тұқым қуаламайтын өзгергіштік?", a: ["Мутация", "Модификация", "Комбинация", "Геномдық"], r: 1, n: "Модификация ортаға байланысты."},
        {q: "Нәруызды ыдырататын фермент?", a: ["Амилаза", "Пепсин", "Липаза", "Нуклеаза"], r: 1, n: "Пепсин асқазанда жұмыс істейді."},
        {q: "Жасушасыз тірлік иесі?", a: ["Бактерия", "Вирус", "Амеба", "Зәмбіл"], r: 1, n: "Вирустар — жасушасыз."},
        {q: "Өгіз солитерінің аралық иесі?", a: ["Адам", "Сиыр", "Шошқа", "Ит"], r: 1, n: "Дернәсілі сиыр етінде болады."},
        {q: "Зиготадағы хромосома жиынтығы?", a: ["Гаплоидты", "Диплоидты", "Триплоидты", "Жоқ"], r: 1, n: "Зигота — қосарлы (2n)."},
        {q: "Жылы қанды жануарды тап?", a: ["Балық", "Бақа", "Құс", "Жылан"], r: 2, n: "Құстардың қаны жылы."},
        {q: "Ағзаның жарыққа реакциясы?", a: ["Фототропизм", "Фотопериодизм", "Таксис", "Рефлекс"], r: 1, n: "Фотопериодизм — маусымдық өзгеріс."},
        {q: "Өсімдікте крахмал қайда жиналады?", a: ["Лейкопласт", "Хлоропласт", "Хромопласт", "Вакуоль"], r: 0, n: "Лейкопласт — түссіз пластид."},
        {q: "Жүректің оң жағындағы клапан?", a: ["Митральды", "Үш жақтаулы", "Жарты ай", "Қос жақтаулы"], r: 1, n: "Оң жақта үш жақтаулы болады."},
        {q: "Генотип деген не?", a: ["Сыртқы белгі", "Гендер жиынтығы", "Түр саны", "Хромосома"], r: 1, n: "Барлық гендер жиынтығы."},
        {q: "Цитология нені зерттейді?", a: ["Тін", "Жасуша", "Мүше", "Ген"], r: 1, n: "Цитология — жасуша туралы ғылым."},
        {q: "Асқазандағы микробты өлтіретін зат?", a: ["Су", "Тұз қышқылы", "Май", "Крахмал"], r: 1, n: "HCl залалсыздандырады."},
