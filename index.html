<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO-ULTRA 100 🔥</title>
    <style>
        :root { --main: #27ae60; --dark: #1b262c; --light: #f4f9f4; --red: #e74c3c; --accent: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; color: #2c3e50; margin: 0; padding: 20px; }
        .container { max-width: 750px; margin: auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-top: 10px solid var(--main); }
        .header { text-align: center; margin-bottom: 30px; }
        .question-card { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .options label { display: block; background: #f8fbf9; padding: 12px; margin: 8px 0; border-radius: 10px; cursor: pointer; border: 1px solid transparent; }
        .options label:hover { background: #eafaf1; border-color: var(--main); }
        input[type="radio"] { accent-color: var(--main); margin-right: 10px; }
        button { width: 100%; padding: 18px; background: var(--main); color: white; border: none; border-radius: 12px; font-size: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--dark); transform: translateY(-2px); }
        #result-screen { display: none; text-align: center; }
        .error-log { text-align: left; background: #fff5f5; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 5px solid var(--red); font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="header">
        <h1 style="color:var(--main)">🧬 BIO-ULTRA 100</h1>
        <p>Базада 100 қиын сұрақ. Саған кездейсоқ <b>20 сұрақ</b> беріледі.</p>
        <p style="color:var(--accent); font-weight:bold; font-size: 20px;">УВЕРЕНСЫҢ БА 30/30-ҒА, БАУЫРЫМ? 🔥</p>
        <button onclick="generateTest()">ТЕСТТІ БАСТАУ 🔥</button>
    </div>

    <div id="quiz-area" style="display:none;">
        <div id="questions-container"></div>
        <button onclick="finishTest()">НӘТИЖЕНІ КӨРУ ✅</button>
    </div>

    <div id="result-screen">
        <div id="score-display" style="font-size: 50px; font-weight: bold; color: var(--main);"></div>
        <div id="status-msg"></div>
        <button onclick="showErrors()" style="background:#555; margin-bottom:10px;">ҚАТЕМЕН ЖҰМЫС ІСТЕУ</button>
        <button onclick="location.reload()" style="background:#27ae60;">ЖАҢА НҰСҚА ТАПСЫРУ 🔄</button>
        <div id="error-list"></div>
    </div>
</div>

<script>
    const database = [
        {q: "Нәруыздың бірінші реттік құрылымындағы байланыс?", a: ["Сутектік", "Пептидтік", "Дисульфидтік", "Иондық"], r: 1, n: "Аминқышқылдары пептидтік байланыспен жалғасады."},
        {q: "Гликолиздің оттегісіз кезеңінде неше АТФ түзіледі?", a: ["2 АТФ", "36 АТФ", "38 АТФ", "0 АТФ"], r: 0, n: "Оттегісіз кезеңде тек 2 моль АТФ бөлінеді."},
        {q: "Дигибридті будандастырудың фенотипі (Мендель)?", a: ["3:1", "1:2:1", "9:3:3:1", "1:1:1:1"], r: 2, n: "Екі белгі бойынша ажырау 9:3:3:1 болады."},
        {q: "Адамдағы Х-хромосомасымен тіркесіп берілетін ауру?", a: ["Даун", "Дальтонизм", "Тұмау", "Альбинизм"], r: 1, n: "Дальтонизм Х-хромосомасына тіркеседі."},
        {q: "ДНҚ-да аденинге комплементарлы нуклеотид?", a: ["Гуанин", "Цитозин", "Тимин", "Урацил"], r: 2, n: "ДНҚ-да А=Т жұбы түзіледі."},
        {q: "Фотосинтездің жарық фазасы қайда өтеді?", a: ["Строма", "Тилакоид", "Матрикс", "Криста"], r: 1, n: "Жарық фазасы тилакоид мембранасында өтеді."},
        {q: "АТФ синтезі жүретін жасушалық органоид?", a: ["Ядро", "Митохондрия", "Гольджи жиынтығы", "ЭПТ"], r: 1, n: "Митохондрия — қуат станциясы."},
        {q: "ДНҚ-дан ақпараттың РНҚ-ға көшірілуі?", a: ["Трансляция", "Транскрипция", "Репликация", "Мутация"], r: 1, n: "Бұл процесс Транскрипция деп аталады."},
        {q: "Адамдағы соматикалық жасушадағы хромосома саны?", a: ["23", "46", "48", "92"], r: 1, n: "Дене жасушаларында 46 хромосома болады."},
        {q: "А дәрумені жетіспегенде пайда болатын ауру?", a: ["Бери-бери", "Рахит", "Ақшам соқыр", "Цинга"], r: 2, n: "А дәрумені көруге жауапты."},
        {q: "Өсімдікте суды жоғары таситын тін?", a: ["Флоэма", "Ксилема", "Камбий", "Паренхима"], r: 1, n: "Ксилема арқылы су көтеріледі."},
        {q: "Мейоздың 1-профазасында хромосомалардың жақындасуы?", a: ["Конъюгация", "Кроссинговер", "Инверсия", "Дупликация"], r: 0, n: "Бұл — Конъюгация."},
        {q: "Орталық жүйке жүйесіне не жатады?", a: ["Жүйкелер", "Ми мен жұлын", "Түйіндер", "Рецепторлар"], r: 1, n: "ОЖЖ — ми мен жұлын."},
        {q: "Инсулин гормонын бөлетін без?", a: ["Бауыр", "Ұйқы безі", "Бүйрек", "Гипофиз"], r: 1, n: "Ұйқы безі инсулин бөледі."},
        {q: "Бактерия жасушасына тән емес құрылым?", a: ["ДНҚ", "Рибосома", "Ядро", "Мембрана"], r: 2, n: "Бактерияда ядро болмайды."},
        {q: "Қалқанша безіне қажетті элемент?", a: ["Темір", "Йод", "Кальций", "Магний"], r: 1, n: "Безге Йод қажет."},
        {q: "Партеногенез дегеніміз не?", a: ["Жыныссыз", "Ұрықтанбай даму", "Бүршіктену", "Бөліну"], r: 1, n: "Ұрықтанбаған жұмыртқадан даму."},
        {q: "Нейронның қысқа өсіндісі?", a: ["Аксон", "Дендрит", "Синапс", "Глия"], r: 1, n: "Дендрит — қысқа өсінді."},
        {q: "Вирустардың нәруызды қабығы?", a: ["Мембрана", "Капсид", "Қабырға", "Нуклеоид"], r: 1, n: "Ол — Капсид."},
        {q: "Нәруыз синтезі қайда жүреді?", a: ["иРНҚ", "Рибосома", "ДНҚ", "Лизосома"], r: 1, n: "Рибосома — нәруыз зауыты."},
        {q: "Митоздың қай кезеңінде ядро жойылады?", a: ["Профаза", "Метафаза", "Анафаза", "Телофаза"], r: 0, n: "Профазада ядро бұзылады."},
        {q: "Жасуша мембранасының негізі?", a: ["Нәруыз", "Липидтер", "Көмірсу", "Су"], r: 1, n: "Мембрана липидтерден тұрады."},
        {q: "Фотосинтездің қараңғы фазасы қайда?", a: ["Тилакоид", "Строма", "Грана", "Матрикс"], r: 1, n: "Стромада жүреді."},
        {q: "Гемофилия қандай мутация?", a: ["Гендік", "Хромосомалық", "Геномдық", "Жоқ"], r: 0, n: "Бұл — гендік мутация."},
        {q: "Ересек адамда неше сүйек бар?", a: ["150", "206", "300", "100"], r: 1, n: "Шамамен 206 сүйек."},
        {q: "Ішкі ортаның тұрақтылығы?", a: ["Метаболизм", "Гомеостаз", "Анаболизм", "Катаболизм"], r: 1, n: "Бұл — Гомеостаз."},
        {q: "Жүйке жасушасының ұзын өсіндісі?", a: ["Дендрит", "Аксон", "Синапс", "Глия"], r: 1, n: "Аксон — ұзын өсінді."},
        {q: "Рахит қай дәрумен жетпегенде болады?", a: ["А", "В", "С", "D"], r: 3, n: "D дәрумені жетпесе сүйек қисаяды."},
        {q: "Митохондрия мембрана иірімдері?", a: ["Грана", "Криста", "Строма", "Матрикс"], r: 1, n: "Олар — кристалар."},
        {q: "Жануардағы қор көмірсуы?", a: ["Крахмал", "Гликоген", "Целлюлоза", "Хитин"], r: 1, n: "Гликоген бауырда сақталады."},
        {q: "ДНҚ репликациясы қайда жүреді?", a: ["Интерфаза", "Профаза", "Метафаза", "Телофаза"], r: 0, n: "Интерфазаның S-кезеңінде."},
        {q: "Иммунитет безі?", a: ["Бүйрек", "Айырша без", "Өкпе", "Асқазан"], r: 1, n: "Тимус (айырша без)."},
        {q: "Өсімдік қабырғасы неден тұрады?", a: ["Хитин", "Муреин", "Целлюлоза", "Май"], r: 2, n: "Целлюлоза беріктік береді."},
        {q: "Трансляция қайда өтеді?", a: ["Ядро", "Рибосома", "Лизосома", "ЭПТ"], r: 1, n: "Рибосомада нәруыз құрастырылады."},
        {q: "Аппендикс қандай мүше?", a: ["Атавизм", "Рудимент", "Аналог", "Гомолог"], r: 1, n: "Рудимент — қалдық мүше."},
        {q: "Көру зонасы қайда?", a: ["Маңдай", "Төбе", "Шүйде", "Самай"], r: 2, n: "Шүйде көруге жауапты."},
        {q: "Бактериофаг деген не?", a: ["Бактерия", "Вирус", "Балдыр", "Саңырауқұлақ"], r: 1, n: "Бактерияны жейтін вирус."},
        {q: "АТФ-та неше макроэргиялық байланыс бар?", a: ["1", "2", "3", "4"], r: 1, n: "2 жоғары энергиялы байланыс."},
        {q: "Қанның сұйық бөлігі?", a: ["Лимфа", "Плазма", "Сарысу", "Су"], r: 1, n: "Ол — плазма."},
        {q: "Гаметалар бөлінуі?", a: ["Митоз", "Мейоз", "Амитоз", "Шизогония"], r: 1, n: "Мейоз арқылы бөлінеді."},
        {q: "ДНҚ-да АТГ-ға комплементарлы?", a: ["ТАЦ", "УАЦ", "ГЦТ", "ЦГТ"], r: 0, n: "Комплементарлық: А-Т, Г-Ц."},
        {q: "Қантты азайтатын гормон?", a: ["Адреналин", "Тироксин", "Инсулин", "Глюкагон"], r: 2, n: "Инсулин қантты түсіреді."},
        {q: "Эритроцит қызметі?", a: ["Қорғаныш", "Газ тасымалдау", "Ұю", "Энергия"], r: 1, n: "Оттегі мен CO2 тасиды."},
        {q: "Тыныс орталығы қайда?", a: ["Ортаңғы", "Сопақша", "Мишық", "Аралық"], r: 1, n: "Сопақша мида орналасқан."},
        {q: "Ас қорыту мүшесі?", a: ["Рибосома", "Лизосома", "ЭПТ", "Вакуоль"], r: 1, n: "Лизосома — ас қорытады."},
        {q: "Қос тынысты ағза?", a: ["Бақа", "Кит", "Құс", "Акула"], r: 2, n: "Құстарда ауа қапшықтары бар."},
        {q: "Генетикалық код неше нуклеотидтен?", a: ["1", "2", "3", "4"], r: 2, n: "Код триплетті (3)."},
        {q: "Саңырауқұлақ қабырғасы?", a: ["Целлюлоза", "Хитин", "Гликоген", "Муреин"], r: 1, n: "Хитиннен тұрады."},
        {q: "Есту рецепторлары қайда?", a: ["Жарғақ", "Ұлу", "Балғаша", "Үзеңгі"], r: 1, n: "Ұлуда (ішкі құлақ)."},
        {q: "Ыдыратушы ағзалар?", a: ["Продуцент", "Консумент", "Редуцент", "Паразит"], r: 2, n: "Редуценттер бейорганикалыққа айналдырады."},
        {q: "Гендік инженерия нысаны?", a: ["Плазмида", "Вирус", "Ядро", "Тін"], r: 0, n: "Плазмида тасымалдаушы."},
        {q: "Биогенетикалық заң авторлары?", a: ["Шлейден", "Мюллер, Геккель", "Уотсон", "Дарвин"], r: 1, n: "Мюллер мен Геккель."},
        {q: "Әмбебап донор қай топ?", a: ["I", "II", "III", "IV"], r: 0, n: "I (0) тобы — донор."},
        {q: "Тұқым қуаламайтын өзгергіштік?", a: ["Мутация", "Модификация", "Комбинация", "Геном"], r: 1, n: "Модификация тұқым қуаламайды."},
        {q: "Нәруызды ыдырататын фермент?", a: ["Амилаза", "Пепсин", "Липаза", "Нуклеаза"], r: 1, n: "Пепсин асқазанда жұмыс істейді."},
        {q: "Жасушасыз тірлік иесі?", a: ["Бактерия", "Вирус", "Амеба", "Зәмбіл"], r: 1, n: "Вирустар — жасушасыз."},
        {q: "Өгіз солитері аралық иесі?", a: ["Адам", "Сиыр", "Шошқа", "Ит"], r: 1, n: "Сиыр етінде дамиды."},
        {q: "Зиготадағы жиынтық?", a: ["Гаплоид", "Диплоид", "Триплоид", "Жоқ"], r: 1, n: "Зигота қосарлы (2n)."},
        {q: "Жылы қанды жануар?", a: ["Балық", "Бақа", "Құс", "Жылан"], r: 2, n: "Құстардың қаны жылы."},
        {q: "Жарыққа реакция?", a: ["Фототропизм", "Фотопериодизм", "Таксис", "Рефлекс"], r: 1, n: "Бұл — фотопериодизм."},
        {q: "Крахмал қай пластидте?", a: ["Лейкопласт", "Хлоропласт", "Хромопласт", "Вакуоль"], r: 0, n: "Лейкопластта сақталады."},
        {q: "Жүректің оң клапаны?", a: ["Митраль", "Үш жақтаулы", "Жарты ай", "Қос жақтаулы"], r: 1, n: "Оң жақта үш жақтаулы."},
        {q: "Генотип деген не?", a: ["Сыртқы", "Гендер жиынтығы", "Түр", "Мүше"], r: 1, n: "Гендер жиынтығы."},
        {q: "Цитология нені зерттейді?", a: ["Тін", "Жасуша", "Мүше", "Ген"], r: 1, n: "Жасуша туралы ғылым."},
        {q: "Асқазандағы микроб өлтіргіш?", a: ["Су", "Тұз қышқылы", "Май", "Крахмал"], r: 1, n: "Тұз қышқылы (HCl)."},
        {q: "Мойын омыртқа саны?", a: ["5", "7", "10", "12"], r: 1, n: "Сүтқоректіде 7 омыртқа."},
        {q: "Гликоген қайда?", a: ["Бүйрек", "Бауыр", "Өкпе", "Ми"], r: 1, n: "Бауырда жиналады."},
        {q: "ДНҚ тізбегі байланысы?", a: ["Пептид", "Сутектік", "Иондық", "Метал"], r: 1, n: "Нуклеотидтер сутектік байланыспен."},
        {q: "Стресс гормоны?", a: ["Инсулин", "Тироксин", "Адреналин", "Өсу"], r: 2, n: "Адреналин бөлінеді."},
        {q: "Жануарда жоқ мүше?", a: ["Ядро", "Пластид", "Рибосома", "ЭПТ"], r: 1, n: "Пластид тек өсімдікте."},
        {q: "РНҚ-да жоқ нуклеотид?", a: ["Аденин", "Тимин", "Гуанин", "Урацил"], r: 1, n: "Тимин тек ДНҚ-да."},
        {q: "Тұқым қуалайтын өзгеріс?", a: ["Мутация", "Модификация", "Маусым", "Жарақат"], r: 0, n: "Мутация беріледі."},
        {q: "Ең ұзын сүйек?", a: ["Омыртқа", "Ортан жілік", "Қабырға", "Бас"], r: 1, n: "Ортан жілік — ең ұзын."},
        {q: "Фотосинтез бөлетін газ?", a: ["Азот", "Оттегі", "Сутегі", "Аргон"], r: 1, n: "Оттегі бөлінеді."},
        {q: "Бүйрек бірлігі?", a: ["Нейрон", "Нефрон", "Аксон", "Альвеола"], r: 1, n: "Ол — нефрон."},
        {q: "Генеративті мүше?", a: ["Тамыр", "Гүл", "Сабақ", "Жапырақ"], r: 1, n: "Гүл — көбею мүшесі."},
        {q: "Синапс деген не?", a: ["Өсінді", "Түйісу жері", "Жүйке", "Ми"], r: 1, n: "Нейрондар байланысы."},
        {q: "Цинга қай дәруменнен?", a: ["А", "В", "С", "D"], r: 2, n: "С дәрумені жетпегенде."},
        {q: "Екі жақты симметрия?", a: ["Медуза", "Адам", "Гидра", "Актиния"], r: 1, n: "Адам денесі екіге тең."},
        {q: "Эритроцит қайда жойылады?", a: ["Жүрек", "Көкбауыр", "Өкпе", "Бүйрек"], r: 1, n: "Көкбауырда өледі."},
        {q: "Ұрықты зерттейтін?", a: ["Генетика", "Эмбриология", "Экология", "Анатомия"], r: 1, n: "Эмбриология — ұрық туралы."},
        {q: "Гемоглобині бар жасуша?", a: ["Лейкоцит", "Эритроцит", "Тромбоцит", "Фагоцит"], r: 1, n: "Эритроцитте болады."},
        {q: "Асқорытудың ең ұзыны?", a: ["Асқазан", "Ащы ішек", "Тоқ ішек", "Өңеш"], r: 1, n: "Ащы ішек — ең ұзын."},
        {q: "Жасуша теориясы?", a: ["Дарвин", "Шлейден, Шванн", "Уотсон", "Павлов"], r: 1, n: "1839 жылы ашылды."},
        {q: "Прокариотты тап?", a: ["Саңырауқұлақ", "Бактерия", "Өсімдік", "Адам"], r: 1, n: "Бактерияда ядро жоқ."},
        {q: "Автотроф деген не?", a: ["Дайын зат", "Органика түзу", "Паразит", "Ыдырату"], r: 1, n: "Өзі зат түзеді."},
        {q: "Сұрыпталу нәтижесі?", a: ["Мутация", "Бейімделу", "Өлім", "Шаршау"], r: 1, n: "Ортаға бейімделеді."},
        {q: "Транскрипция қайда?", a: ["Рибосома", "Ядро", "ЭПТ", "Мембрана"], r: 1, n: "Ядрода көшіріледі."},
        {q: "Жүрекке қан әкелетін?", a: ["Артерия", "Вена", "Капилляр", "Аорта"], r: 1, n: "Венамен келеді."},
        {q: "Торлы қабықтағы рецептор?", a: ["Құтыша", "Нейрон", "Аксон", "Синапс"], r: 0, n: "Құтыша мен таяқша."},
        {q: "Тіс бұзылуы?", a: ["Тұмау", "Кариес", "Гастрит", "Рахит"], r: 1, n: "Бұл — кариес."},
        {q: "Биосфера ғалымы?", a: ["Дарвин", "Вернадский", "Линней", "Ламарк"], r: 1, n: "В. Вернадский ілімі."},
        {q: "Импульс жылдам қайда?", a: ["Миелинді", "Миелінсіз", "Бұлшықет", "Сүйек"], r: 0, n: "Миелинде жылдам."},
        {q: "Өсімдік тыныс алса?", a: ["Оттегі", "CO2", "Азот", "Сутегі"], r: 1, n: "Тыныс алғанда CO2 бөледі."},
        {q: "Метаболизм деген не?", a: ["Көбею", "Зат алмасу", "Қозғалу", "Өсу"], r: 1, n: "Зат алмасу процесі."},
        {q: "Глюкоза ыдыраса не шығады?", a: ["Май", "Су және CO2", "Нәруыз", "Тұз"], r: 1, n: "Энергия, су және газ."},
        {q: "Ген деген не?", a: ["Нәруыз", "ДНҚ бөлігі", "Жасуша", "Мүше"], r: 1, n: "ДНҚ-ның функционалды бөлігі."},
        {q: "Хромосома қайда?", a: ["Цитоплазма", "Ядро", "Вакуоль", "Лизосома"], r: 1, n: "Ядрода орналасқан."},
        {q: "Қанды сүзетін 'фильтр'?", a: ["Жүрек", "Бүйрек", "Өкпе", "Асқазан"], r: 1, n: "Бүйрек қанды тазалайды."}
    ];

    let currentTest = [];
    let userAnswers = [];

    function generateTest() {
        currentTest = [...database].sort(() => 0.5 - Math.random()).slice(0, 20);
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        const container = document.getElementById('questions-container');
        container.innerHTML = currentTest.map((item, i) => `
            <div class="question-card">
                <p><strong>${i+1}. ${item.q}</strong></p>
                <div class="options">
                    ${item.a.map((opt, idx) => `<label><input type="radio" name="q${i}" value="${idx}"> <span>${['А','Б','С','Д'][idx]}) ${opt}</span></label>`).join('')}
                </div>
            </div>
        `).join('');
        window.scrollTo(0, 0);
    }

    function finishTest() {
        let score = 0; userAnswers = [];
        currentTest.forEach((item, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const val = sel ? parseInt(sel.value) : null;
            userAnswers.push(val);
            if(val === item.r) score++;
        });
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-display').innerText = `${score} / 20`;
        const msg = document.getElementById('status-msg');
        msg.innerHTML = score < 10 ? '<h2 style="color:red">СЕН ТУПОЙЙЙЙЙ! 💀</h2>' : '<h2 style="color:green">ЖАРАЙСЫҢ, БАУЫРЫМ! 🔥🦍</h2>';
    }

    function showErrors() {
        const list = document.getElementById('error-list');
        list.innerHTML = currentTest.map((item, i) => userAnswers[i] !== item.r ? `
            <div class="error-log">
                <strong>${i+1}. ${item.q}</strong><br>
                <span style="color:green">Дұрыс: ${['А','Б','С','Д'][item.r]}) ${item.a[item.r]}</span><br>
                <small>💡 ${item.n}</small>
            </div>
        ` : "").join("");
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
